<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            margin: 0;
            background-color: #f4f6fb;
            color: #333;
        }

        .topbar {
            width: 100%;
            height: 60px;
            background-color: #2f5ea8;
        }

        .container {
            min-height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 35px 30px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1f2d3d;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #2f5ea8;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2f5ea8;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #264d89;
        }

        .flash-message {
            margin-bottom: 15px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .error {
            background-color: #ffe5e5;
            color: #b30000;
            border: 1px solid #ffb3b3;
        }

        .footer-text {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .footer-text a {
            color: #2f5ea8;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="topbar"></div>

    <div class="container">
        <div class="card">
            <h2>Iniciar Sesión</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-message error">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Ingrese su usuario" required>

                <label for="clave">Contraseña</label>
                <input type="password" id="clave" name="clave" placeholder="Ingrese su contraseña" required>

                <button type="submit">Iniciar Sesión</button>
            </form>

            <div class="footer-text">
                ¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate</a>
            </div>
        </div>
    </div>
</body>
</html>
